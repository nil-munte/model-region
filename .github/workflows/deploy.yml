name: Deploy to GitHub Pages

on:
  push:
    branches: [clean-main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # Job 1: Scrape fresh data (only when needed)
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Run scrapers only on schedule, manual trigger, or scraper code changes
    if: |
      github.event_name == 'schedule' || 
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'src/scrapers/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Cache root dependencies
        id: cache-root
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: root-deps-
          
      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci
        
      - name: Run Azure scraper
        run: npm run scrape:azure
        continue-on-error: true
        
      - name: Run AWS scraper
        run: npm run scrape:aws
        continue-on-error: true
        
      - name: Run Azure Databricks scraper
        run: npm run scrape:azure-databricks
        continue-on-error: true
        
      - name: Run GCP scraper
        run: npm run scrape:gcp
        continue-on-error: true
        
      - name: Validate scraped data
        run: npm run validate-data || echo "Validation script not found, skipping"
        
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update model data [skip ci]"
            git push
          fi

  # Job 2: Build and deploy
  build-and-deploy:
    needs: [scrape]
    if: always()  # Run even if scrape was skipped
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: clean-main  # Always use latest clean-main (after scrape commit)
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Cache web dependencies
        id: cache-web
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: web-deps-${{ hashFiles('web/package-lock.json') }}
          restore-keys: web-deps-
          
      - name: Install web dependencies
        if: steps.cache-web.outputs.cache-hit != 'true'
        working-directory: ./web
        run: npm ci
        
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            web/.next/cache
            web/.next/static
          key: nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/**/*.tsx', 'web/**/*.ts', 'web/**/*.css') }}
          restore-keys: |
            nextjs-${{ hashFiles('web/package-lock.json') }}-
            nextjs-
            
      - name: Type check web app
        working-directory: ./web
        run: npx tsc --noEmit || echo "Type check failed but continuing"
        
      - name: Build Next.js static export
        working-directory: ./web
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Add deployment info
        working-directory: ./web/out
        run: |
          echo "{\"commit\":\"${{ github.sha }}\",\"buildNumber\":${{ github.run_number }},\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > deployment-info.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
